workflows:
  godot-android-build:
    name: Build ponGame Android APK (Release)
    max_build_duration: 15
    instance_type: linux_x2  # Menggunakan server Linux instan yang cepat
    environment:
      groups:
        - android_credentials
      vars:
        GODOT_VERSION: "4.3"
      java: 17
      triggering:
        events:
         - push
        when:
          branch: main
    scripts:
      - name: Setup Android SDK Dependencies
        script: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "platform-tools" "build-tools;34.0.0" "platforms;android-34" "cmdline-tools;latest"

      - name: Download Godot Engine and Templates
        script: |
          mkdir -p /tmp/godot
          cd /tmp/godot
          
          curl -LO "https://github.com{GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          
          mkdir -p ~/.local/share/godot/export_templates
          curl -LO "https://github.com{GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"

      - name: Configure Release Keystore and Injection
        script: |
          mkdir -p ~/.config/godot
          
          # Membuat kunci enkripsi KHUSUS RELEASE secara otomatis di server Codemagic
          keytool -genkey -v -keystore ~/release.keystore -storepass hamidstudio123 -alias ponkey \
            -keypass hamidstudio123 -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=hamIDStudio,O=hamIDStudio,C=ID"

          # SUNTIKKAN PENGATURAN RELEASE KE FILE export_presets.cfg
          if [ -f export_presets.cfg ]; then
            sed -i 's|keystore/release=".*"|keystore/release="'$HOME'/release.keystore"|g' export_presets.cfg
            sed -i 's|keystore/release_user=".*"|keystore/release_user="ponkey"|g' export_presets.cfg
            sed -i 's|keystore/release_password=".*"|keystore/release_password="hamidstudio123"|g' export_presets.cfg
          else
            echo "EROR: File export_presets.cfg tidak ditemukan! Anda harus mengunggah file ini ke Git."
            exit 1
          fi

      - name: Import Godot Assets
        script: |
          godot --headless --path . --import

      - name: Export Android APK (Release Mode)
        script: |
          mkdir -p build/android
          godot --headless --path . --export-release "Android" build/android/ponGame-release.apk

    artifacts:
      - build/android/*.apk