name: Build ponGame Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  GODOT_VERSION: "4.3"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java (dibutuhkan Gradle/Android build tools)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Cache Godot export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-${{ env.GODOT_VERSION }}

      - name: Download Godot headless + export templates
        run: |
          mkdir -p /tmp/godot
          cd /tmp/godot
          curl -LO "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download export templates (if not cached)
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          cd /tmp
          curl -LO "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mv templates "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"

      - name: Setup Android SDK / build tools
        uses: android-actions/setup-android@v3

      - name: Install Android command line tools components
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "platform-tools" "build-tools;34.0.0" "platforms;android-34" "cmdline-tools;latest"

            - name: Configure Godot editor settings and injection
        run: |
          mkdir -p ~/.config/godot
          # 1. Buat debug keystore di runner GitHub
          keytool -genkey -v -keystore ~/debug.keystore -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=hamIDStudio,O=hamIDStudio,C=ID"
          
          # 2. Atur Editor Settings global Godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

          # 3. SUNTIKKAN PATH KE export_presets.cfg (Solusi Eror Konfigurasi)
          # Ini akan mengganti baris keystore bawaan lokal PC Anda dengan path milik GitHub Runner
          if [ -f export_presets.cfg ]; then
            sed -i 's|keystore/debug=".*"|keystore/debug="'$HOME'/debug.keystore"|g' export_presets.cfg
            sed -i 's|keystore/debug_user=".*"|keystore/debug_user="androiddebugkey"|g' export_presets.cfg
            sed -i 's|keystore/debug_password=".*"|keystore/debug_password="android"|g' export_presets.cfg
          else
            echo "PERINGATAN: File export_presets.cfg tidak ditemukan di root proyek! Harap commit file tersebut."
          fi

      - name: Import project resources
        run: godot --headless --path . --import

      - name: Export Android APK (debug)
        run: |
          mkdir -p build/android
          godot --headless --path . --export-debug "Android" build/android/ponGame-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ponGame-android-debug
          path: build/android/ponGame-debug.apk
